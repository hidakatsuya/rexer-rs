name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload to a draft release"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.context.outputs.tag }}
    steps:
      - id: context
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Ensure draft release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.context.outputs.tag }}
        run: |
          if draft_state="$(gh release view "${TAG}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "${draft_state}" != "true" ]; then
              echo "Release ${TAG} is already published. Immutable releases cannot be modified." >&2
              exit 1
            fi
            exit 0
          fi

          gh release create "${TAG}" --draft --generate-notes --verify-tag

  build-and-upload:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rex
            asset_name: rex-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rex
            asset_name: rex-darwin-aarch64

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libgit2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          fi
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} rex

      - name: Create tarball
        run: tar -czf ${{ matrix.asset_name }}.tar.gz rex

      - name: Upload binary to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release upload "${TAG}" ${{ matrix.asset_name }}.tar.gz --clobber
